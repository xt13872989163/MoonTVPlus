name: Deploy MoonTVPlus

on:
  push:
    branches:
      - custom
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: 检查 Secrets 是否存在
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          MOONTV_PASSWORD: ${{ secrets.MOONTV_PASSWORD }}
        run: |
          set -euo pipefail
          [ -n "${SSH_HOST}" ] || (echo "Missing secret: SSH_HOST" && exit 1)
          [ -n "${SSH_USER}" ] || (echo "Missing secret: SSH_USER" && exit 1)
          [ -n "${SSH_PRIVATE_KEY}" ] || (echo "Missing secret: SSH_PRIVATE_KEY" && exit 1)
          [ -n "${MOONTV_PASSWORD}" ] || (echo "Missing secret: MOONTV_PASSWORD" && exit 1)

      - name: SSH 预检
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          debug: true
          script_stop: true
          command_timeout: 60s
          script: |
            set -euo pipefail
            whoami
            hostname
            pwd

      - name: 自动部署到服务器
        uses: appleboy/ssh-action@v1.0.3
        env:
          MOONTV_PASSWORD: ${{ secrets.MOONTV_PASSWORD }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          envs: MOONTV_PASSWORD
          script_stop: true
          command_timeout: 15m
          script: |
            set -Eeuo pipefail
            trap 'code=$?; echo "Failed command: $BASH_COMMAND"; exit $code' ERR

            TARGET="/opt/moontv"
            REPO_URL="https://github.com/xt13872989163/MoonTVPlus.git"
            BRANCH="custom"

            echo "[1/7] 检查远程环境变量"
            : "${MOONTV_PASSWORD:?MOONTV_PASSWORD is not available on remote shell}"

            echo "[2/7] 准备部署目录"
            mkdir -p "$TARGET/config"
            cd "$TARGET"

            echo "[3/7] 初始化仓库"
            if [ ! -d .git ]; then
              git init
              git remote add origin "$REPO_URL"
            else
              git remote set-url origin "$REPO_URL"
            fi

            echo "[4/7] 同步远端代码"
            git fetch --depth=1 origin "$BRANCH"
            git checkout -B "$BRANCH"
            git reset --hard "origin/$BRANCH"

            echo "[5/7] 生成运行时环境文件"
            umask 077
            printf 'PASSWORD=%s\n' "$MOONTV_PASSWORD" > .env.runtime

            echo "[6/7] 校验并启动容器"
            docker compose --env-file .env.runtime config >/dev/null
            docker compose --env-file .env.runtime down || true
            docker compose --env-file .env.runtime up -d --build
            docker image prune -f

            echo "[7/7] 清理临时文件"
            rm -f .env.runtime

            echo "====================================="
            echo "部署完成"
            echo "访问地址: http://${{ secrets.SSH_HOST }}:3000"
            echo "配置文件: /opt/moontv/config/settings.json"
            echo "====================================="

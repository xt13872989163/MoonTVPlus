name: Deploy MoonTVPlus

on:
  push:
    branches:
      - custom
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: 检查 Secrets 是否存在
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          MOONTV_PASSWORD: ${{ secrets.MOONTV_PASSWORD }}
        run: |
          set -euo pipefail
          [ -n "${SSH_HOST}" ] || (echo "Missing secret: SSH_HOST" && exit 1)
          [ -n "${SSH_USER}" ] || (echo "Missing secret: SSH_USER" && exit 1)
          [ -n "${SSH_PRIVATE_KEY}" ] || (echo "Missing secret: SSH_PRIVATE_KEY" && exit 1)
          [ -n "${MOONTV_PASSWORD}" ] || (echo "Missing secret: MOONTV_PASSWORD" && exit 1)

      - name: SSH 预检
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          debug: true
          script_stop: true
          command_timeout: 60s
          script: |
            set -euo pipefail
            whoami
            hostname
            pwd

      - name: 自动部署到服务器
        uses: appleboy/ssh-action@v1.0.3
        env:
          MOONTV_PASSWORD: ${{ secrets.MOONTV_PASSWORD }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          envs: MOONTV_PASSWORD
          script_stop: true
          command_timeout: 20m
          script: |
            set -Eeuo pipefail
            trap 'code=$?; echo "Failed command: $BASH_COMMAND"; exit $code' ERR

            TARGET="/opt/moontv"
            REPO_URL="https://github.com/xt13872989163/MoonTVPlus.git"
            BRANCH="custom"

            echo "[1/7] 检查环境变量"
            : "${MOONTV_PASSWORD:?MOONTV_PASSWORD is not available on remote shell}"

            echo "[2/7] 准备部署目录"
            mkdir -p "$TARGET"
            cd "$TARGET"

            echo "[3/7] 停止旧容器"
            docker compose down || true

            echo "[4/7] 清空目录"
            find "$TARGET" -mindepth 1 -maxdepth 1 -exec rm -rf {} +

            echo "[5/7] 拉取最新代码"
            git clone --depth=1 -b "$BRANCH" "$REPO_URL" "$TARGET"

            echo "[6/7] 生成运行时环境文件"
            umask 077
            printf 'PASSWORD=%s\n' "$MOONTV_PASSWORD" > "$TARGET/.env.runtime"

            echo "[7/7] 启动服务"
            cd "$TARGET"
            docker compose --env-file .env.runtime config >/dev/null
            docker compose --env-file .env.runtime up -d --build
            docker image prune -f
            rm -f "$TARGET/.env.runtime"

            echo "====================================="
            echo "部署完成"
            echo "访问地址: http://${{ secrets.SSH_HOST }}:3000"
            echo "====================================="

name: Deploy MoonTVPlus
on:
  push:
    branches:
      - custom
  workflow_dispatch:  # 手动触发开关（保留）

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 自动部署到服务器
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            TARGET="/opt/moontv"
            mkdir -p $TARGET/config
            cd $TARGET

            # 🔥 修复：只更新代码，不删除 config 配置（保留你的账号密码）
            git init
            git remote set-url origin https://github.com/xt13872989163/MoonTVPlus.git || git remote add origin https://github.com/xt13872989163/MoonTVPlus.git
            git fetch origin
            git checkout custom -f

            # 启动服务
            docker compose down
            docker compose up -d
            docker image prune -f

            echo "====================================="
            echo "✅ 部署完成！"
            echo "🌐 访问地址：http://${{ secrets.SSH_HOST }}:3000"
            echo "📁 配置文件：/opt/moontv/config/settings.json"
            echo "====================================="
